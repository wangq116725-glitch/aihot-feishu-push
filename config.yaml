api:
  ai_hot_url: "https://aihot.virxact.com/api/public/items"
  mode: "all"
  default_limit: 100
  request_retry: 1
  timeout_seconds: 30

filter:
  target_top_n: 5
  ranking_pool_size: 20
  relevance_threshold: 60
  final_score_threshold: 65
  mainstream_ai_companies:
    - OpenAI
    - Gemini
    - 飞书
    - ChatGPT
    - OpenClaw
    - Shopify
    - Amazon
    - TikTok
    - TikTok Shop
    - Meta
    - Google
    - Canva
    - Adobe
  valid_categories:
    - AI
    - 模型
    - 产品
    - 工具
    - Agent
    - 芯片
    - 融资
    - 政策
    - 行业
    - 电商
    - 跨境
    - 营销
    - 设计
    - 视频
    - 物流
    - 客服
    - 开发
    - 自动化
  keep_keywords:
    - AI
    - 人工智能
    - 大模型
    - LLM
    - Agent
    - 智能体
    - OpenAI
    - ChatGPT
    - Claude
    - Gemini
    - DeepSeek
    - Anthropic
    - Google AI
    - Microsoft AI
    - Meta AI
    - OpenClaw
    - 机器人
    - AI芯片
    - 算力
    - 生成式AI
    - 商品图
    - AI商品图
    - 产品图
    - 图像生成
    - 视频生成
    - AI视频
    - 短视频
    - TikTok
    - TikTok Shop
    - TikTok视频监控
    - 竞品分析
    - 竞品素材
    - 素材分析
    - 广告素材
    - 电商
    - 跨境电商
    - Shopify
    - Amazon
    - 亚马逊
    - 店铺运营
    - 运营提效
    - 客服自动化
    - 物流自动化
    - 物流跟踪
    - 自动化脚本
    - 脚本自动化
    - AI编程
    - 代码生成
    - 编程助手
    - RPA
